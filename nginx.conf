server {
    listen 80;
    server_name seudominio.com.br www.seudominio.com.br;

    # Redirecionar HTTP para HTTPS (após instalar SSL com Certbot)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name seudominio.com.br www.seudominio.com.br;

    # SSL — gerado pelo Certbot automaticamente
    ssl_certificate     /etc/letsencrypt/live/seudominio.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/seudominio.com.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Logs
    access_log /var/log/nginx/shopmotor_access.log;
    error_log  /var/log/nginx/shopmotor_error.log;

    # Uploads de fotos servidos diretamente pelo Nginx (mais rápido)
    location /uploads/ {
        alias /var/www/shopmotor/public/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Arquivos estáticos do Next.js
    location /_next/static/ {
        alias /var/www/shopmotor/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy para o Next.js (PM2 na porta 3000)
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Limite de upload para fotos de veículos (10MB)
    client_max_body_size 10M;
}
